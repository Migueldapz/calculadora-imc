<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Calculadora IMC</title>
  <link rel="stylesheet" href="./assets/css/style.css">
  <style class="style"></style>

</head>

<body>

  <section class="container">
    <div class="datatual"></div>
  </section>
  
  <section class="container">
    <h1>Calculadora IMC</h1>
    <div class="imc-main">
          <div class="imc-main-p-p">
          <p class="main-text, main-main-text">IMC</p>
          <p class="main-text">Menos que 18,5</p>
          <p class="main-text">Entre 18,5 e 24,9</p>
          <p class="main-text">Entre 25 e 29.9</p>
          <p class="main-text">Entre 30 e 34,9</p>
          <p class="main-text">Entre 35 e 39,9</p>
          <p class="main-text">Mais do que 40</p>
        </div>
        <div class="imc-main-p-p">
          <p class="main-text, main-main-text">RESULTADO</p>
          <p class="main-text">Abaxo do peso</p>
          <p class="main-text">Peso normal</p>
          <p class="main-text">Sobrepeso</p>
          <p class="main-text">Obesidade grau 1</p>
          <p class="main-text">Obesidade grau 2</p>
          <p class="main-text">Obesidade grau 3</p>
        </div>
    </div>
  
    <h1 class="h1-2">Calcule seu IMC</h1>
    <form class="form">
      <label for="input">Peso/kg:</label>
      <input type="text" class="input-valor">

      <label for="input">Altura/m:</label>
      <input type="text" class="input-valor1">


      <button>Enviar</button>
    </form>
    <div class="resultado"></div>
  </section>

  <script src="./assets/js/main.js"></script>
</body>

</html>
